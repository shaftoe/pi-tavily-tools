name: Run Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run lint
      - run: bun run format
      - run: bun test
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
